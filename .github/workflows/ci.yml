name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and mock API verifier
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify mock API
        run: pnpm verify:mock-api

      - name: Verify mock Gemini API
        run: pnpm verify:mock-gemini-api

      - name: Verify mock model discovery
        run: pnpm verify:mock-model-discovery

      - name: Verify queue concurrency smoke
        run: pnpm verify:queue-concurrency-smoke

      - name: Verify Gallery mutation smoke
        run: pnpm verify:gallery-mutation-smoke

  mac-package:
    name: macOS package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package macOS app
        run: pnpm package:mac

  windows-package:
    name: Windows package
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Windows app
        run: pnpm package:win

      - name: Verify Windows package
        env:
          # GitHub-hosted Windows runners can fail NSIS silent install even when
          # the packaged app launches correctly. Keep full-install verification
          # for dedicated Windows release evidence.
          IMAGE2TOOLS_WINDOWS_VERIFY_MODE: package-smoke
        run: pnpm verify:release:windows

  linux-package:
    name: Linux package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux smoke-test dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb xauth libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64 libgbm1 libdrm2 libxkbcommon0

      - name: Package Linux app
        run: pnpm package

      - name: Verify CLI and MCP smoke
        run: |
          app_executable="$(find release -maxdepth 2 -type f -path '*/linux*-unpacked/crossgen' -print -quit)"
          test -n "$app_executable"
          CROSSGEN_APP_EXECUTABLE="$app_executable" CROSSGEN_APP_EXTRA_ARGS="--no-sandbox" xvfb-run -a node scripts/verify-cli-mcp-smoke.mjs

      - name: Verify Linux package
        run: pnpm verify:release:linux
