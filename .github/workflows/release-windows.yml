name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v0.2.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release evidence gate
        run: pnpm verify:release-evidence -- --require-complete

      - name: Package Windows app
        run: pnpm package:win

      - name: Verify Windows package
        env:
          IMAGE2TOOLS_WINDOWS_VERIFY_MODE: full-install
        run: pnpm verify:release:windows

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossgen-windows-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          path: |
            release/CrossGen-Setup.exe
            release/CrossGen-Setup.exe.blockmap
          if-no-files-found: error

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/CrossGen-Setup.exe
            release/CrossGen-Setup.exe.blockmap
