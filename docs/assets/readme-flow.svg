<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-label="CrossGen workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#e7f2ee"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#173736" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1440" height="480" rx="28" fill="url(#bg)"/>
  <text x="90" y="86" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#221f1c">From prompt to local asset</text>
  <text x="90" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#70665b">A focused desktop loop for GPT Image 2 generation, edits, inpainting, download, and recovery.</text>
  <g filter="url(#cardShadow)">
    <rect x="90" y="178" width="240" height="190" rx="22" fill="#f4f1ea" stroke="#d6d0c3"/>
    <text x="124" y="232" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1f6f61">1. Configure</text>
    <text x="124" y="268" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">API key is stored</text>
    <text x="124" y="294" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">locally with Electron</text>
    <text x="124" y="320" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">safeStorage when available.</text>
  </g>
  <path d="M354 273H438" stroke="#1f6f61" stroke-width="8" stroke-linecap="round"/>
  <path d="M438 273 414 250M438 273 414 296" stroke="#1f6f61" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#cardShadow)">
    <rect x="468" y="178" width="240" height="190" rx="22" fill="#f4f1ea" stroke="#d6d0c3"/>
    <text x="502" y="232" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1f6f61">2. Create</text>
    <text x="502" y="268" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">Generate, edit, or paint</text>
    <text x="502" y="294" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">a mask for inpainting with</text>
    <text x="502" y="320" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">validated image parameters.</text>
  </g>
  <path d="M732 273H816" stroke="#1f6f61" stroke-width="8" stroke-linecap="round"/>
  <path d="M816 273 792 250M816 273 792 296" stroke="#1f6f61" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#cardShadow)">
    <rect x="846" y="178" width="240" height="190" rx="22" fill="#f4f1ea" stroke="#d6d0c3"/>
    <text x="880" y="232" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1f6f61">3. Preview</text>
    <text x="880" y="268" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">Streaming partial images</text>
    <text x="880" y="294" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">appear before the final</text>
    <text x="880" y="320" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4e473f">output is written.</text>
  </g>
  <path d="M1110 273H1194" stroke="#1f6f61" stroke-width="8" stroke-linecap="round"/>
  <path d="M1194 273 1170 250M1194 273 1170 296" stroke="#1f6f61" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#cardShadow)">
    <rect x="1224" y="178" width="126" height="190" rx="22" fill="#1f6f61"/>
    <text x="1252" y="244" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#fffdf8">4. Keep</text>
    <text x="1252" y="280" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e4f2ee">History,</text>
    <text x="1252" y="306" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e4f2ee">download,</text>
    <text x="1252" y="332" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e4f2ee">recover.</text>
  </g>
</svg>
